<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chess Royale</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#111; font-family:'Segoe UI',sans-serif; touch-action:none; }
  body { display:flex; justify-content:center; align-items:center; }
  #game-container { position:relative; }

  /* ── Lobby ── */
  #lobby {
    position:fixed; inset:0; background:#111; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; z-index:100; padding:20px;
  }
  #lobby h1 { font-size:clamp(26px,7vw,40px); color:#fff; font-weight:800; letter-spacing:3px; }
  #lobby .subtitle { font-size:13px; color:#666; }
  #lobby input {
    background:#1a1a1a; border:1px solid #333; border-radius:8px;
    color:#fff; font-size:20px; padding:10px 16px; text-align:center;
    width:min(220px,80vw); letter-spacing:4px; text-transform:uppercase; outline:none;
  }
  #lobby input:focus { border-color:#888; }
  .lobby-btn {
    background:#fff; color:#111; border:none; border-radius:8px;
    padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer;
    width:min(220px,80vw); transition:background 0.1s;
  }
  .lobby-btn:active { background:#ccc; }
  .lobby-btn.outline { background:transparent; border:1px solid #333; color:#888; }
  .lobby-btn.outline:active { border-color:#888; color:#fff; }
  #lobby-status { font-size:12px; color:#e74c3c; min-height:18px; text-align:center; }
  #waiting { font-size:13px; color:#666; display:none; text-align:center; }
  #version { position:fixed; bottom:12px; left:14px; font-size:11px; color:#333; }

  /* ── HUD ── */
  #ui-overlay {
    position:absolute; bottom:0; left:0; right:0;
    display:flex; align-items:flex-end; justify-content:center;
    gap:var(--card-gap); padding:var(--card-pad); pointer-events:none;
  }
  .card-slot {
    background:#1a1a1a; border:1.5px solid #333; border-radius:10px;
    padding:8px 4px 7px; display:flex; flex-direction:column;
    align-items:center; gap:4px; cursor:pointer; pointer-events:all;
    transition:border-color 0.15s, transform 0.1s; user-select:none;
    width:var(--card-w);
  }
  .card-slot:active { transform:translateY(-3px); border-color:#fff; }
  .card-slot.selected { border-color:#fff; border-width:2px; transform:translateY(-5px); background:#222; }
  .card-slot.disabled { opacity:0.35; cursor:not-allowed; transform:none; }
  .card-icon { font-size:var(--card-icon); line-height:1; color:#fff; }
  .card-name { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:0.5px; }
  .card-cost { background:#8b5cf6; border-radius:4px; padding:2px 7px; font-size:11px; color:#fff; font-weight:700; }
  .card-cost.red { background:#dc2626; }
  #next-card {
    background:#0d0d0d; border:0.5px dashed #333; border-radius:8px;
    width:calc(var(--card-w) * 0.72); padding:6px 2px; display:flex; flex-direction:column;
    align-items:center; gap:2px; opacity:0.55;
  }

  /* ── Elixir ── */
  #elixir-bar-container {
    position:absolute; left:var(--elix-left); top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    width:var(--elix-w);
  }
  #elixir-track {
    width:var(--elix-track-w); height:var(--elixir-h); background:#222; border-radius:8px;
    overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end;
  }
  #elixir-fill { width:100%; height:0%; background:#8b5cf6; border-radius:8px; transition:height 0.1s linear; }
  #elixir-val { font-size:13px; color:#c084fc; font-weight:700; }
  #elixir-lbl { font-size:8px; color:#444; text-transform:uppercase; }

  /* ── Labels ── */
  #player-labels {
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; padding:4px 8px; pointer-events:none;
  }
  .plabel { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:600; }
  .pdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  #hotkeys { position:absolute; bottom:var(--card-bar-h); left:50%; transform:translateX(-50%); font-size:8px; color:#333; pointer-events:none; white-space:nowrap; }

  /* ── Panels ── */
  #gameover {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.96); border:1px solid #333; border-radius:14px;
    padding:22px 32px; text-align:center; display:none; z-index:20; width:82%;
  }
  #gameover h1 { font-size:24px; margin-bottom:6px; color:#fff; }
  #gameover p { color:#666; font-size:13px; }
  #rematch-btn {
    margin-top:14px; background:#fff; color:#111; border:none;
    border-radius:8px; padding:11px 24px; font-size:14px; font-weight:700;
    cursor:pointer; width:100%;
  }
  #rematch-btn:disabled { opacity:0.4; cursor:not-allowed; }
  #rematch-status { color:#666; font-size:11px; margin-top:8px; min-height:16px; }
  #disconnected {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.96); border:1px solid #e74c3c; border-radius:14px;
    padding:20px 32px; text-align:center; display:none; z-index:30; width:82%;
  }
  #disconnected h2 { color:#e74c3c; margin-bottom:8px; font-size:18px; }
  #disconnected p { color:#666; font-size:13px; }
</style>
</head>
<body>

<div id="lobby">
  <h1>Chess Royale</h1>
  <p class="subtitle">Chess meets Clash Royale</p>
  <input id="room-input" maxlength="6" placeholder="ROOM CODE" autocomplete="off" />
  <button class="lobby-btn" onclick="createRoom()">Create Room</button>
  <button class="lobby-btn outline" onclick="joinRoom()">Join Room</button>
  <div id="lobby-status"></div>
  <div id="waiting">⏳ Waiting for opponent...</div>
  <div id="version">v1.0.2</div>
</div>

<div id="game-container" style="display:none;">
  <div id="player-labels">
    <div class="plabel" style="color:#aaa;"><div class="pdot" style="background:#aaa;"></div><span id="p2label">Opponent</span></div>
    <div class="plabel" style="color:#fff;"><span id="p1label">You</span><div class="pdot" style="background:#fff;"></div></div>
  </div>
  <div id="elixir-bar-container">
    <span style="font-size:9px;color:#444;">21</span>
    <div id="elixir-track"><div id="elixir-fill"></div></div>
    <span id="elixir-val">0</span>
    <span id="elixir-lbl">elixir</span>
  </div>
  <div id="ui-overlay">
    <div class="card-slot" id="card0" onclick="selectCard(0)">
      <div class="card-icon" id="icon0">♟</div>
      <div class="card-name" id="cname0">Pawn</div>
      <div class="card-cost" id="ccost0">2</div>
    </div>
    <div class="card-slot" id="card1" onclick="selectCard(1)">
      <div class="card-icon" id="icon1">♞</div>
      <div class="card-name" id="cname1">Knight</div>
      <div class="card-cost" id="ccost1">5</div>
    </div>
    <div class="card-slot" id="card2" onclick="selectCard(2)">
      <div class="card-icon" id="icon2">♜</div>
      <div class="card-name" id="cname2">Rook</div>
      <div class="card-cost" id="ccost2">7</div>
    </div>
    <div id="next-card">
      <div style="font-size:7px;color:#444;text-transform:uppercase;">next</div>
      <div class="card-icon" id="next-icon" style="font-size:18px;">♝</div>
      <div style="font-size:8px;color:#555;" id="next-name">Bishop</div>
    </div>
  </div>
  <div id="hotkeys">tap piece → destination · tap card → home row · ESC deselect</div>
  <div id="gameover">
    <h1 id="go-title">You Win!</h1>
    <p>The king has been captured.</p>
    <button id="rematch-btn" onclick="requestRematch()">Rematch</button>
    <p id="rematch-status"></p>
  </div>
  <div id="disconnected">
    <h2>Opponent Left</h2>
    <p>The game has ended.</p>
  </div>
</div>

<script>
// ── Responsive sizing ──────────────────────────────────────────────────────
const ELIX_W = Math.max(32, Math.min(44, window.innerWidth * 0.09));
const ELIX_TRACK_W = Math.max(12, ELIX_W * 0.45);
const CARD_BAR_H = Math.min(100, window.innerHeight * 0.17);
const LABEL_H = 22;
const SAFE_H = window.innerHeight * 0.88;
const BOARD_SIZE = Math.min(window.innerWidth - ELIX_W - 6, SAFE_H - CARD_BAR_H - LABEL_H - 10);
const CELL = Math.floor(BOARD_SIZE / 8);
const BOARD_PX = CELL * 8;
const CANVAS_W = BOARD_PX + ELIX_W + 4;
const CANVAS_H = BOARD_PX + LABEL_H + CARD_BAR_H;
const CARD_W = Math.min(82, (BOARD_PX - 40) / 3.6);
const CARD_ICON = Math.min(32, CARD_W * 0.44);
const CARD_GAP = Math.max(4, (BOARD_PX - CARD_W * 3 - 40) / 4);
const CARD_PAD = Math.max(5, CARD_BAR_H * 0.08);
const ELIXIR_H = BOARD_PX - 8;

document.documentElement.style.setProperty('--card-w', CARD_W+'px');
document.documentElement.style.setProperty('--card-icon', CARD_ICON+'px');
document.documentElement.style.setProperty('--card-gap', CARD_GAP+'px');
document.documentElement.style.setProperty('--card-pad', CARD_PAD+'px');
document.documentElement.style.setProperty('--card-bar-h', CARD_BAR_H+'px');
document.documentElement.style.setProperty('--elixir-h', ELIXIR_H+'px');
document.documentElement.style.setProperty('--elix-left', '2px');
document.documentElement.style.setProperty('--elix-w', ELIX_W+'px');
document.documentElement.style.setProperty('--elix-track-w', ELIX_TRACK_W+'px');

// ── Socket ─────────────────────────────────────────────────────────────────
const socket = io();
let myPlayerIdx = -1;

const PIECE_ICONS = {king:'♔',queen:'♛',rook:'♜',bishop:'♝',knight:'♞',pawn:'♟'};
const PIECE_NAMES = {king:'King',queen:'Queen',rook:'Rook',bishop:'Bishop',knight:'Knight',pawn:'Pawn'};
const PIECE_DEPLOY = {king:0,queen:10,rook:7,bishop:5,knight:5,pawn:2};

function moveCostClient(type,fr,fc,tr,tc) {
  const d=Math.max(Math.abs(tr-fr),Math.abs(tc-fc));
  return type==='knight'?5:d*{king:10,queen:3,rook:2,bishop:2,pawn:1}[type];
}

// ── Lobby ──────────────────────────────────────────────────────────────────
function setStatus(msg,err=false){
  const el=document.getElementById('lobby-status');
  el.textContent=msg; el.style.color=err?'#e74c3c':'#666';
}
function createRoom(){
  const code=document.getElementById('room-input').value.trim().toUpperCase();
  if(!code||code.length<2){setStatus('Enter a room code first',true);return;}
  socket.emit('createRoom',code);
}
function joinRoom(){
  const code=document.getElementById('room-input').value.trim().toUpperCase();
  if(!code||code.length<2){setStatus('Enter the room code',true);return;}
  socket.emit('joinRoom',code);
}

socket.on('joined',({playerIdx})=>{
  myPlayerIdx=playerIdx;
  if(playerIdx===0) document.getElementById('waiting').style.display='block';
});
socket.on('error',(msg)=>setStatus(msg,true));
socket.on('gameStart',()=>{
  document.getElementById('lobby').style.display='none';
  document.getElementById('game-container').style.display='block';
  if(myPlayerIdx===1){
    document.getElementById('p1label').textContent='You';
    document.getElementById('p2label').textContent='Opponent';
  }
  initPhaserGame();
});

// ── Rematch (fixed) ────────────────────────────────────────────────────────
socket.on('rematchVote',({mine,votes})=>{
  if(mine){
    // I voted — disable my button, show waiting
    document.getElementById('rematch-btn').disabled=true;
    document.getElementById('rematch-status').textContent='Waiting for opponent...';
  } else {
    // Opponent voted — show their status but keep my button active
    document.getElementById('rematch-status').textContent='Opponent wants a rematch!';
  }
});

socket.on('rematchStart',()=>{
  document.getElementById('gameover').style.display='none';
  document.getElementById('rematch-btn').disabled=false;
  document.getElementById('rematch-status').textContent='';
  selected=null; selectedCard=-1;
});

function requestRematch(){
  socket.emit('rematch');
}

socket.on('playerLeft',()=>{ document.getElementById('disconnected').style.display='block'; });

// ── Game state ─────────────────────────────────────────────────────────────
let gameState=null, selected=null, selectedCard=-1;

socket.on('state',(state)=>{
  gameState=state;
  if(state.gameOver){
    const won=state.winner===myPlayerIdx+1;
    document.getElementById('go-title').textContent=won?'👑 You Win!':'💀 You Lose';
    document.getElementById('go-title').style.color=won?'#fff':'#e74c3c';
    document.getElementById('gameover').style.display='block';
  }
  renderAll();
});

// ── Phaser ─────────────────────────────────────────────────────────────────
let scene, cellG=[], pieceT=[], costT=[], cdOv=[], cdTxt=[];

function initPhaserGame(){
  new Phaser.Game({
    type:Phaser.AUTO, width:CANVAS_W, height:CANVAS_H,
    backgroundColor:'#111', parent:'game-container',
    input:{ mouse:false, touch:false }, // disable Phaser input entirely
    scene:{create:createScene}
  });
}

function getCanvasCell(clientX, clientY){
  const canvas=document.querySelector('#game-container canvas');
  if(!canvas) return null;
  const rect=canvas.getBoundingClientRect();
  const scaleX=CANVAS_W/rect.width, scaleY=CANVAS_H/rect.height;
  const cx=(clientX-rect.left)*scaleX;
  const cy=(clientY-rect.top)*scaleY;
  const OX=ELIX_W+2, OY=LABEL_H;
  const col=Math.floor((cx-OX)/CELL);
  const row=Math.floor((cy-OY)/CELL);
  if(row>=0&&row<8&&col>=0&&col<8) return {row,col};
  return null;
}

function createScene(){
  scene=this;
  const OX=ELIX_W+2, OY=LABEL_H;
  for(let r=0;r<8;r++){
    cellG[r]=[]; pieceT[r]=[]; costT[r]=[]; cdOv[r]=[]; cdTxt[r]=[];
    for(let c=0;c<8;c++){
      const x=OX+c*CELL, y=OY+r*CELL;
      const light=(r+c)%2===0;
      const baseCol=light?0xf0d9b5:0xb58863;
      const g=scene.add.rectangle(x+CELL/2,y+CELL/2,CELL-1,CELL-1,baseCol);
      g.hl=false; g.baseCol=baseCol;
      cellG[r][c]=g;

      pieceT[r][c]=scene.add.text(x+CELL/2,y+CELL/2,'',{
        fontSize:Math.floor(CELL*0.62)+'px',color:'#fff'
      }).setOrigin(0.5,0.5).setDepth(2);

      costT[r][c]=scene.add.text(x+CELL-3,y+3,'',{
        fontSize:Math.max(9,Math.floor(CELL*0.19))+'px',
        fontStyle:'bold',stroke:'#000',strokeThickness:3
      }).setOrigin(1,0).setDepth(10);

      cdOv[r][c]=scene.add.rectangle(x+CELL/2,y+CELL/2,CELL-1,CELL-1,0x000000,0.55)
        .setDepth(5).setVisible(false);

      cdTxt[r][c]=scene.add.text(x+CELL/2,y+CELL/2,'',{
        fontSize:Math.max(10,Math.floor(CELL*0.32))+'px',
        color:'#facc15',fontStyle:'bold',stroke:'#000',strokeThickness:4
      }).setOrigin(0.5,0.5).setDepth(6);
    }
  }
  const homeRow=myPlayerIdx===0?7:0;
  scene.add.rectangle(OX+BOARD_PX/2,OY+homeRow*CELL+CELL/2,BOARD_PX-2,CELL-2,0x00ff00,0)
    .setStrokeStyle(2,0x22c55e).setDepth(1);

  // Single unified input handler for both mouse and touch
  const canvas=scene.sys.game.canvas;
  canvas.style.touchAction='none';
  canvas.style.cursor='pointer';

  canvas.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const cell=getCanvasCell(e.clientX,e.clientY);
    if(cell) onCellClick(cell.row,cell.col);
  },{passive:false});
}

// ── Check detection ────────────────────────────────────────────────────────
function findCheckers(board, kingPlayer) {
  // Find the king
  let kingRow=-1, kingCol=-1;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++)
    if(board[r][c]?.type==='king'&&board[r][c]?.player===kingPlayer) { kingRow=r; kingCol=c; }
  if(kingRow===-1) return [];

  const checkers=[];
  const opp=kingPlayer===1?2:1;
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      if(board[r][c]?.player===opp){
        const moves=getValidMovesClient(board,r,c);
        if(moves.find(m=>m.row===kingRow&&m.col===kingCol)) checkers.push({row:r,col:c});
      }
    }
  }
  return checkers;
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll(){
  if(!scene||!gameState) return;
  const {board,elixir,hands,queueNexts,cooldowns}=gameState;
  const myElixir=elixir[myPlayerIdx];

  // Find checkers against my king
  const myCheckers=findCheckers(board,myPlayerIdx+1);
  const checkerSet=new Set(myCheckers.map(({row,col})=>`${row},${col}`));

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const piece=board[r][c];
      const g=cellG[r][c], t=pieceT[r][c], ct=costT[r][c];
      const light=(r+c)%2===0;
      g.hl=false; ct.setText('');

      // Check highlight
      if(checkerSet.has(`${r},${c}`)){
        g.setFillStyle(0xdc2626); g.hl=true;
      } else {
        g.setFillStyle(g.baseCol);
      }

      if(piece){
        t.setText(PIECE_ICONS[piece.type]);
        // White pieces bright, black pieces dark with stroke
        t.setColor(piece.player===1?'#ffffff':'#1a1a1a');
        t.setStroke(piece.player===1?'#333333':'#cccccc',Math.max(1,Math.floor(CELL*0.04)));
        t.setFontSize((piece.type==='king'?Math.floor(CELL*0.65):Math.floor(CELL*0.55))+'px');
        if(selected&&selected.row===r&&selected.col===c){
          g.setFillStyle(0xf6f669); g.hl=true;
        }
      } else { t.setText(''); }

      // Cooldown
      const cdKey=`${r},${c}`;
      const cdMs=cooldowns&&cooldowns[cdKey]||0;
      if(cdMs>0&&piece&&piece.player===myPlayerIdx+1){
        cdOv[r][c].setVisible(true);
        cdTxt[r][c].setText(Math.ceil(cdMs/1000)+'s');
      } else {
        cdOv[r][c].setVisible(false);
        cdTxt[r][c].setText('');
      }
    }
  }

  // Valid move highlights
  if(selected){
    const piece=board[selected.row][selected.col];
    if(piece){
      const onCd=cooldowns&&(cooldowns[`${selected.row},${selected.col}`]||0)>0;
      if(!onCd){
        getValidMovesClient(board,selected.row,selected.col).forEach(({row,col})=>{
          const cost=moveCostClient(piece.type,selected.row,selected.col,row,col);
          const canAfford=myElixir>=cost;
          const isCapture=!!board[row][col];
          cellG[row][col].setFillStyle(isCapture?0xdc2626:(canAfford?0x22c55e:0xca8a04));
          cellG[row][col].hl=true;
          costT[row][col].setText(cost);
          costT[row][col].setColor(canAfford?'#86efac':'#fbbf24');
        });
      }
    }
  }

  // Elixir
  document.getElementById('elixir-fill').style.height=(myElixir/21*100)+'%';
  document.getElementById('elixir-val').textContent=Math.floor(myElixir);

  // Cards
  hands[myPlayerIdx].forEach((type,i)=>{
    document.getElementById('icon'+i).textContent=PIECE_ICONS[type];
    document.getElementById('cname'+i).textContent=PIECE_NAMES[type];
    const cost=PIECE_DEPLOY[type];
    const costEl=document.getElementById('ccost'+i);
    costEl.textContent=cost;
    const ok=myElixir>=cost;
    document.getElementById('card'+i).className='card-slot'+(selectedCard===i?' selected':'')+(ok?'':' disabled');
    costEl.className='card-cost'+(ok?'':' red');
  });

  const nt=queueNexts?.[myPlayerIdx];
  if(nt){
    document.getElementById('next-icon').textContent=PIECE_ICONS[nt];
    document.getElementById('next-name').textContent=PIECE_NAMES[nt];
  }
}

// ── Move validation ────────────────────────────────────────────────────────
function getValidMovesClient(board,row,col){
  const piece=board[row][col]; if(!piece) return [];
  const moves=[],p=piece.player,dir=p===1?-1:1;
  function add(r,c){if(r<0||r>=8||c<0||c>=8)return false;const t=board[r][c];if(t&&t.player===p)return false;moves.push({row:r,col:c});return!t;}
  function slide(dr,dc){for(let i=1;i<8;i++)if(!add(row+dr*i,col+dc*i))break;}
  switch(piece.type){
    case 'king':for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(dr||dc)add(row+dr,col+dc);break;
    case 'queen':slide(1,0);slide(-1,0);slide(0,1);slide(0,-1);slide(1,1);slide(1,-1);slide(-1,1);slide(-1,-1);break;
    case 'rook':slide(1,0);slide(-1,0);slide(0,1);slide(0,-1);break;
    case 'bishop':slide(1,1);slide(1,-1);slide(-1,1);slide(-1,-1);break;
    case 'knight':[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]].forEach(([dr,dc])=>add(row+dr,col+dc));break;
    case 'pawn':{
      const fr=row+dir;
      if(fr>=0&&fr<8&&!board[fr][col]){moves.push({row:fr,col});const sr=p===1?6:1;if(row===sr&&!board[row+dir*2]?.[col])moves.push({row:row+dir*2,col});}
      [-1,1].forEach(dc=>{if(col+dc>=0&&col+dc<8&&board[fr]?.[col+dc]?.player&&board[fr][col+dc].player!==p)moves.push({row:fr,col:col+dc});});
      break;
    }
  }
  return moves;
}

// ── Input ──────────────────────────────────────────────────────────────────
function onCellClick(row,col){
  if(!gameState||gameState.gameOver) return;
  const board=gameState.board, piece=board[row][col], myElixir=gameState.elixir[myPlayerIdx];

  if(selectedCard!==-1){socket.emit('deploy',{cardIdx:selectedCard,row,col});selectedCard=-1;renderAll();return;}

  if(piece&&piece.player===myPlayerIdx+1){
    selected=(selected&&selected.row===row&&selected.col===col)?null:{row,col};
    renderAll();return;
  }

  if(selected){
    const sp=board[selected.row][selected.col];
    if(!sp){selected=null;renderAll();return;}
    const valid=getValidMovesClient(board,selected.row,selected.col).find(m=>m.row===row&&m.col===col);
    if(!valid){selected=null;renderAll();return;}
    const cost=moveCostClient(sp.type,selected.row,selected.col,row,col);
    if(myElixir<cost){flashError();return;}
    socket.emit('move',{fromRow:selected.row,fromCol:selected.col,toRow:row,toCol:col});
    selected=null;renderAll();
  }
}

function selectCard(i){
  if(!gameState) return;
  const type=gameState.hands[myPlayerIdx][i]; if(!type) return;
  if(gameState.elixir[myPlayerIdx]<PIECE_DEPLOY[type]) return;
  selectedCard=selectedCard===i?-1:i; selected=null; renderAll();
}

function flashError(){
  const bar=document.getElementById('elixir-track');
  bar.style.outline='2px solid #dc2626';
  setTimeout(()=>bar.style.outline='none',300);
}

document.addEventListener('keydown',e=>{
  if(e.key==='1')selectCard(0);
  if(e.key==='2')selectCard(1);
  if(e.key==='3')selectCard(2);
  if(e.key==='Escape'){selected=null;selectedCard=-1;renderAll();}
});
</script>
